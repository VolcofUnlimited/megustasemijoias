<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megusta Semijóias</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.2">
    
    <style>
        /* RESET E ESTRUTURA STICKY FOOTER */
        html, body { height: 100%; margin: 0; padding: 0; display: flex; flex-direction: column; background: #fff; font-family: 'Montserrat', sans-serif; }
        main.vitrine { flex: 1 0 auto; }
        footer { flex-shrink: 0; width: 100%; }

        /* CABEÇALHO ULTRA COMPACTO */
        header { padding: 10px 0 5px; text-align: center; position: relative; border-bottom: 1px solid #f8f8f8; }
        .logo { max-width: 110px; height: auto; margin-bottom: 5px; } 
        nav ul { display: flex; justify-content: center; gap: 20px; list-style: none; padding: 0; margin: 5px 0; }
        nav ul li a { text-decoration: none; color: #999; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }
        
        #user-info-container { position: absolute; top: 10px; left: 15px; font-size: 7px; color: #ccc; letter-spacing: 1px; }
        .carrinho-topo { position: absolute; top: 10px; right: 20px; text-decoration: none; color: #000; display: flex; align-items: center; gap: 4px; }

        /* VITRINE LUXO */
        #container-titulo-categoria { text-align: center; padding: 25px 0 15px; }
        #nome-categoria-atual { font-weight: 200; letter-spacing: 6px; text-transform: uppercase; font-size: 14px; color: #bbb; margin: 0; }

        .grade-produtos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 40px; 
            padding: 20px 40px; 
            max-width: 1300px; 
            margin: 0 auto; 
        }
        .produto-card { text-align: center; cursor: pointer; }
        .img-container { width: 100%; aspect-ratio: 1 / 1; margin: 0 auto 10px; overflow: hidden; background-color: #f9f9f9; position: relative; }
        .produto-card img { width: 100%; height: 100%; object-fit: cover; }
        .produto-card h3 { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin: 8px 0; color: #000; }

        /* --- RODAPÉ LUXO PROFISSIONAL --- */
        .footer-links-container { background-color: #F9F9F9; padding: 25px 10px; text-align: center; border-top: 1px solid #eee; }
        .link-fendi { 
            color: #A39684 !important; /* Tom Fendi */
            text-decoration: none !important; 
            font-size: 10px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            margin: 0 15px;
            font-weight: 400;
        }
        .link-fendi:hover { color: #000 !important; }

        .footer-black-bar { background-color: #000; padding: 12px; text-align: center; }
        .footer-black-bar p { font-size: 7px; letter-spacing: 2px; color: #FFFFFF; margin: 0; text-transform: uppercase; }
        .footer-black-bar strong { font-weight: 700; color: #FFFFFF; }

        /* MODAL LUXO */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 2000; overflow-y: auto; }
        .modal-conteudo { max-width: 850px; margin: 30px auto; padding: 40px; position: relative; background: #fff; }
        .modal-flex { display: flex; gap: 40px; align-items: center; flex-wrap: wrap; }
        .btn-carrinho { background-color: rgba(163, 150, 132, 0.85) !important; color: #1a1a1a !important; font-weight: 700 !important; letter-spacing: 2px; padding: 18px; border-radius: 50px !important; border: none; cursor: pointer; width: 100%; font-size: 10px; text-transform: uppercase; }

        .miniaturas-container { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .miniatura { width: 50px; height: 50px; border-radius: 4px; cursor: pointer; object-fit: cover; opacity: 0.5; border: 1px solid #eee; }
        .miniatura.active { opacity: 1; border-color: #A39684; }

        .esgotado { opacity: 0.5; filter: grayscale(1); cursor: default !important; }

        @media (max-width: 600px) {
            .grade-produtos { grid-template-columns: repeat(2, 1fr); padding: 10px; gap: 15px; }
            .modal-flex { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <div id="user-info-container">
            <span id="user-info">BEM-VINDO</span>
            <button id="btn-logout" style="display:none; background:none; border:none; color:#A39684; cursor:pointer; font-weight:700; margin-left:5px; text-transform:uppercase;">[ Sair ]</button>
        </div>
        <div class="logo-container"><img src="Logo.png" alt="Megusta" class="logo"></div>
        <nav>
            <ul>
                <li><a href="javascript:void(0)" onclick="window.filtrar('todos')">TODOS</a></li>
                <li><a href="javascript:void(0)" onclick="window.filtrar('brincos')">BRINCOS</a></li>
                <li><a href="javascript:void(0)" onclick="window.filtrar('colares')">COLARES</a></li>
                <li><a href="javascript:void(0)" onclick="window.filtrar('pulseiras')">PULSEIRAS</a></li>
                <li><a href="javascript:void(0)" onclick="window.filtrar('aneis')">ANÉIS</a></li>
            </ul>
        </nav>
        <a href="carrinho.html" class="carrinho-topo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span id="contagem-carrinho" style="font-weight: 700; font-size: 10px;">0</span>
        </a>
    </header>

    <main class="vitrine">
        <div id="container-titulo-categoria"><h1 id="nome-categoria-atual">TODOS OS PRODUTOS</h1></div>
        <div class="grade-produtos" id="lista-produtos"></div>
    </main>

    <footer>
        <div class="footer-links-container">
            <a href="#" class="link-fendi">Sobre</a>
            <a href="https://wa.me/5511985906325" target="_blank" class="link-fendi">Contato</a>
            <a href="https://www.instagram.com/megusta_semijoias/" target="_blank" class="link-fendi">Instagram</a>
        </div>
        <div class="footer-black-bar">
            <p>© 2026 MEGUSTA SEMIJÓIAS - DESENVOLVIDO POR <strong>VOLCOF.UNLIMITED</strong></p>
        </div>
    </footer>

    <div id="meuModal" class="modal">
        <div class="modal-conteudo">
            <span onclick="window.fecharModal()" style="position:absolute; top:10px; right:20px; font-size:30px; cursor:pointer; font-weight:200;">&times;</span>
            <div class="modal-flex">
                <div class="img-modal-container">
                    <div id="modalPrincipal"></div>
                    <div id="modalMiniaturas" class="miniaturas-container"></div>
                </div>
                <div class="info-produto-modal">
                    <h2 id="tituloModal"></h2>
                    <p id="precoModal"></p>
                    <p id="descModal"></p>
                    <button class="btn-carrinho" id="btnAdicionarAoCarrinho">ADICIONAR AO CARRINHO</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDuV0zO-5M4IkpTqzwaWqvL15HCitqaXME", authDomain: "megusta-semijoias.firebaseapp.com", projectId: "megusta-semijoias", storageBucket: "megusta-semijoias.appspot.com", messagingSenderId: "998632232244", appId: "1:998632232244:web:45473970818b8374e20161" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // LOGIN REAL FUNCIONAL
        onAuthStateChanged(auth, (user) => {
            const info = document.getElementById('user-info');
            const btnLogout = document.getElementById('btn-logout');
            if (user) { 
                info.innerText = `OLÁ, ${user.email.split('@')[0].toUpperCase()}`;
                btnLogout.style.display = 'inline-block';
            } else {
                info.innerText = "BEM-VINDO";
                btnLogout.style.display = 'none';
            }
        });
        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());

        let produtos = [];
        async function carregar() {
            const snap = await getDocs(query(collection(db, "produtos"), orderBy("dataCriacao", "desc")));
            produtos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderizar();
        }

        window.renderizar = function(cat = 'todos') {
            const container = document.getElementById('lista-produtos');
            document.getElementById('nome-categoria-atual').innerText = cat === 'todos' ? 'TODOS OS PRODUTOS' : cat.toUpperCase();
            container.innerHTML = '';
            const filtrados = cat === 'todos' ? produtos : produtos.filter(p => p.categoria.toLowerCase() === cat.toLowerCase());
            
            filtrados.forEach(p => {
                const esgotado = p.estoque <= 0;
                const card = document.createElement('div');
                card.className = `produto-card ${esgotado ? 'esgotado' : ''}`;
                card.innerHTML = `<div class="img-container"><img src="${p.imagens[0]}" loading="lazy"></div><h3>${p.nome}</h3><p style="font-weight:700; font-size:11px;">${p.preco}</p>`;
                if (!esgotado) card.onclick = () => abrirModal(p);
                container.appendChild(card);
            });
            atualizarContagem();
        }

        function abrirModal(p) {
            document.getElementById('tituloModal').innerText = p.nome;
            document.getElementById('precoModal').innerText = p.preco;
            document.getElementById('descModal').innerText = p.descricao;
            document.getElementById('modalPrincipal').innerHTML = `<img src="${p.imagens[0]}" id="imgPrincipalModal" style="width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:4px;">`;

            const miniaturas = document.getElementById('modalMiniaturas');
            miniaturas.innerHTML = '';
            if (p.imagens.length > 1) {
                p.imagens.forEach((img, i) => {
                    miniaturas.innerHTML += `<img src="${img}" class="miniatura ${i===0?'active':''}" onclick="window.trocarFoto('${img}', this)">`;
                });
            }

            document.getElementById('btnAdicionarAoCarrinho').onclick = () => {
                let carrinho = JSON.parse(localStorage.getItem('carrinho_megusta')) || [];
                carrinho.push({ id: p.id, nome: p.nome, preco: p.preco, foto: p.imagens[0], estoqueMax: p.estoque });
                localStorage.setItem('carrinho_megusta', JSON.stringify(carrinho));
                atualizarContagem();
                fecharModal();
            };
            document.getElementById('meuModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        window.trocarFoto = (src, el) => {
            document.getElementById('imgPrincipalModal').src = src;
            document.querySelectorAll('.miniatura').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
        };

        window.fecharModal = () => { document.getElementById('meuModal').style.display = 'none'; document.body.style.overflow = 'auto'; };
        window.filtrar = (c) => renderizar(c);
        function atualizarContagem() { document.getElementById('contagem-carrinho').innerText = (JSON.parse(localStorage.getItem('carrinho_megusta')) || []).length; }

        carregar();
    </script>
</body>
</html>
