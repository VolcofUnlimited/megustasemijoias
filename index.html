<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeGusta Semijóias | Exclusividade</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;700&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; padding: 0; display: flex; flex-direction: column; background: #fff; font-family: 'Montserrat', sans-serif; color: #1a1a1a; -webkit-font-smoothing: antialiased; }
        main.vitrine { flex: 1 0 auto; }
        footer { flex-shrink: 0; }
        a { text-decoration: none; color: inherit; transition: 0.3s; }

        header { padding: 10px 15px; text-align: center; position: relative; border-bottom: 1px solid #f8f8f8; background: #fff; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { max-width: 130px; height: auto; } 

        .header-right { display: flex; align-items: center; gap: 15px; flex: 1; justify-content: flex-end; }
        .icon-user, .icon-cart { width: 20px; height: 20px; color: #333; cursor: pointer; }
        .user-name-text { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: #1a1a1a; font-weight: 400; display: none; } 

        .nav-categorias { width: 100%; border-bottom: 1px solid #f8f8f8; overflow-x: auto; white-space: nowrap; }
        .nav-categorias::-webkit-scrollbar { display: none; }
        nav ul { display: flex; justify-content: center; gap: 25px; list-style: none; padding: 15px 15px; margin: 0; }
        nav ul li a { text-decoration: none; color: #333; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; font-weight: 400; cursor: pointer; }

        #container-titulo-categoria { text-align: center; padding: 45px 0 30px; }
        #nome-categoria-atual { font-weight: 300; letter-spacing: 10px; text-transform: uppercase; font-size: 15px; color: #999; margin: 0; }
        
        .grade-produtos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 1400px; margin: 0 auto; }
        .produto-card { text-align: center; cursor: pointer; position: relative; padding-bottom: 10px; }
        .img-container { width: 100%; aspect-ratio: 1 / 1; margin-bottom: 8px; overflow: hidden; background-color: #f9f9f9; }
        .produto-card img { width: 100%; height: 100%; object-fit: cover; }
        .produto-card h3 { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; margin: 5px 0; font-weight: 300; }
        .produto-card.esgotado { filter: grayscale(1); opacity: 0.6; pointer-events: none; }
        .tag-esgotado { display: none; font-size: 8px; font-weight: 700; color: #ff4d4d; letter-spacing: 1px; }
        .produto-card.esgotado .tag-esgotado { display: block; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-conteudo { width: 90%; max-width: 700px; background: #fff; padding: 30px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border-radius: 8px; max-height: 90vh; overflow-y: auto; }
        .fechar-modal { position: absolute; top: 15px; right: 15px; font-size: 20px; cursor: pointer; font-weight: 700; color: #fff; background: #000; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.3s; z-index: 2100; }
        
        .modal-flex { display: flex; flex-direction: column; gap: 20px; }
        .btn-add-cart { background-color: rgba(163, 150, 132, 1); color: #fff; border: none; padding: 18px; border-radius: 50px; cursor: pointer; width: 100%; font-size: 10px; text-transform: uppercase; font-weight: 700; letter-spacing: 2px; }

        .footer-links-row { background-color: #F9F9F9; padding: 25px 10px; text-align: center; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 15px; }
        .link-fendi { color: #A39684 !important; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }
        .footer-black-row { background: #000; padding: 20px; text-align: center; }
        .footer-black-row p { font-size: 7px; color: #fff; margin: 0; text-transform: uppercase; }

        @media (min-width: 768px) {
            header { padding: 15px 40px; }
            .logo { max-width: 160px; }
            .user-name-text { display: inline-block; }
            .grade-produtos { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; padding: 0 60px 80px; }
            .modal-flex { flex-direction: row; gap: 30px; }
            .info-produto-modal { text-align: left; flex: 1; display: flex; flex-direction: column; justify-content: center; }
            .footer-links-row { flex-direction: row; justify-content: center; gap: 40px; }
        }
    </style>
</head>
<body>

    <header>
        <div style="flex:1;"></div>
        <div class="logo-container"><a href="index.html"><img src="Logo.png" alt="Megusta" class="logo"></a></div>
        <div class="header-right">
            <div class="auth-container" onclick="window.location.href='login.html'">
                <svg class="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span id="user-display" class="user-name-text">BEM-VINDO</span>
                <button id="btn-logout-header" onclick="event.stopPropagation(); window.fazerLogout()" style="display:none; font-size:7px; color:#A39684; border:none; background:none; cursor:pointer;">Sair</button>
            </div>
            <div class="cart-container" onclick="window.location.href='carrinho.html'">
                <svg class="icon-cart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span id="contagem-carrinho" class="cart-count-ref">0</span>
            </div>
        </div>
    </header>

    <div class="nav-categorias">
        <nav><ul id="menu-dinamico"></ul></nav>
    </div>

    <main class="vitrine">
        <div id="container-titulo-categoria">
            <h1 id="nome-categoria-atual">TODOS OS PRODUTOS</h1>
        </div>
        <div class="grade-produtos" id="lista-produtos"></div>
    </main>

    <div id="modalProduto" class="modal">
        <div class="modal-conteudo">
            <span class="fechar-modal" onclick="window.fecharModal()">&times;</span>
            <div class="modal-flex">
                <div style="flex:1.2;">
                    <div id="modalPrincipal" style="width:100%; aspect-ratio:1/1; overflow:hidden; background:#f9f9f9; border-radius:4px;"></div>
                    <div id="modalMiniaturas" style="display:flex; justify-content:center; gap:8px; margin-top:10px;"></div>
                </div>
                <div class="info-produto-modal">
                    <h2 id="tituloModal" style="font-weight:200; letter-spacing:4px; text-transform:uppercase; font-size:16px; margin:0 0 10px;"></h2>
                    <p id="precoModal" style="color:#D1BE9C; font-weight:700; font-size:18px; margin:0 0 15px;"></p>
                    <p id="descModal" style="font-size:11px; color:#666; line-height:1.6; margin:0 0 20px; font-weight:300;"></p>
                    <button id="btnAddAoCarrinho" class="btn-add-cart">Adicionar à Sacola</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links-row">
            <a href="#" class="link-fendi">A Marca</a>
            <a href="https://wa.me/5511916773300" target="_blank" class="link-fendi">Atendimento</a>
            <a href="https://www.instagram.com/megusta_semijoias/" target="_blank" class="link-fendi">Instagram</a>
        </div>
        <div class="footer-black-row">
            <p>© 2026 MeGusta Semijóias – Fine Jewelry. By <strong>VOLCOF.UNLIMITED</strong></p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDuV0zO-5M4IkpTqzwaWqvL15HCitqaXME", authDomain: "megusta-semijoias.firebaseapp.com", projectId: "megusta-semijoias", storageBucket: "megusta-semijoias.appspot.com", messagingSenderId: "998632232244", appId: "1:998632232244:web:45473970818b8374e20161" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let produtos = [];

        async function carregarTudo() {
            const snapProd = await getDocs(query(collection(db, "produtos"), orderBy("dataCriacao", "desc")));
            produtos = snapProd.docs.map(doc => ({ id: doc.id, ...doc.data() }));

            // Extração dinâmica do menu
            const categoriasSet = new Set();
            produtos.forEach(p => { if(p.categoria) categoriasSet.add(p.categoria.trim().toLowerCase()); });
            
            const menu = document.getElementById('menu-dinamico');
            menu.innerHTML = `<li><a onclick="window.filtrar('todos')">Início</a></li>`;
            categoriasSet.forEach(cat => {
                menu.innerHTML += `<li><a onclick="window.filtrar('${cat}')">${cat.toUpperCase()}</a></li>`;
            });
            renderizarVitrine('todos');
        }

        window.renderizarVitrine = function(cat) {
            const container = document.getElementById('lista-produtos');
            document.getElementById('nome-categoria-atual').innerText = cat === 'todos' ? 'TODOS OS PRODUTOS' : cat.toUpperCase();
            container.innerHTML = '';
            
            // Filtro Blindado: normaliza ambos para comparar
            const catBusca = cat.trim().toLowerCase();
            const filtrados = (cat === 'todos') 
                ? produtos 
                : produtos.filter(p => (p.categoria || "").trim().toLowerCase() === catBusca);

            filtrados.forEach(p => {
                const esgotado = (p.estoque || 0) <= 0;
                const card = document.createElement('div');
                card.className = `produto-card ${esgotado ? 'esgotado' : ''}`;
                card.onclick = () => !esgotado && abrirModal(p);
                card.innerHTML = `
                    <div class="img-container"><img src="${p.imagens[0]}" loading="lazy"></div>
                    <h3>${p.nome}</h3>
                    <p style="font-weight:700; font-size:11px; margin:0;">${p.preco}</p>
                    <div class="tag-esgotado">ESGOTADO</div>
                `;
                container.appendChild(card);
            });
            document.getElementById('contagem-carrinho').innerText = (JSON.parse(localStorage.getItem('carrinho_megusta')) || []).length;
        }

        window.filtrar = (c) => renderizarVitrine(c);

        window.abrirModal = (p) => {
            document.getElementById('tituloModal').innerText = p.nome;
            document.getElementById('precoModal').innerText = p.preco;
            document.getElementById('descModal').innerText = p.descricao;
            document.getElementById('modalPrincipal').innerHTML = `<img src="${p.imagens[0]}" id="imgPrincipalModal" style="width:100%; height:100%; object-fit:cover;">`;
            const miniaturas = document.getElementById('modalMiniaturas');
            miniaturas.innerHTML = '';
            if(p.imagens && p.imagens.length > 1) {
                p.imagens.forEach((img) => {
                    const m = document.createElement('img');
                    m.src = img; 
                    m.style = "width:40px; height:40px; object-fit:cover; cursor:pointer; opacity:0.5;";
                    m.onclick = () => { document.getElementById('imgPrincipalModal').src = img; };
                    miniaturas.appendChild(m);
                });
            }
            document.getElementById('btnAddAoCarrinho').onclick = () => {
                let carrinho = JSON.parse(localStorage.getItem('carrinho_megusta')) || [];
                const itemExistente = carrinho.find(item => item.id === p.id);
                if (itemExistente && itemExistente.quantidade >= p.estoque) { alert(`Temos apenas ${p.estoque} em estoque.`); return; }
                if (itemExistente) { itemExistente.quantidade += 1; } 
                else { carrinho.push({ id: p.id, nome: p.nome, preco: p.preco, foto: p.imagens[0], quantidade: 1, estoqueMax: p.estoque }); }
                localStorage.setItem('carrinho_megusta', JSON.stringify(carrinho));
                document.getElementById('contagem-carrinho').innerText = carrinho.length;
                fecharModal();
            };
            document.getElementById('modalProduto').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        window.fecharModal = () => { document.getElementById('modalProduto').style.display = 'none'; document.body.style.overflow = 'auto'; };
        
        onAuthStateChanged(auth, (user) => {
            const display = document.getElementById('user-display');
            const logout = document.getElementById('btn-logout-header');
            if (user) { display.innerText = (user.displayName || user.email.split('@')[0]).toUpperCase(); logout.style.display = 'inline-block'; }
        });

        window.fazerLogout = () => signOut(auth).then(() => location.reload());

        carregarTudo();
    </script>
</body>
</html>
