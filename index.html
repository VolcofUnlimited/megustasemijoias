<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeGusta Semijoias</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: #fff; color: #1a1a1a; overflow-x: hidden; }
        header { padding: 60px 20px; text-align: center; }
        .logo { font-weight: 200; letter-spacing: 15px; font-size: 32px; text-transform: uppercase; margin-bottom: 30px; }
        
        .nav-filtros { display: flex; justify-content: center; gap: 30px; margin-bottom: 50px; }
        .btn-filtro { background: none; border: none; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; color: #bbb; transition: 0.3s; padding-bottom: 8px; }
        .btn-filtro.active { color: #000; border-bottom: 1px solid #000; }

        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; padding: 0 40px 100px; max-width: 1300px; margin: 0 auto; }
        .produto-card { text-align: center; cursor: pointer; }
        .img-container { width: 100%; aspect-ratio: 1/1; background: #fdfdfd; margin-bottom: 20px; border-radius: 2px; overflow: hidden; }
        .produto-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .produto-card:hover img { transform: scale(1.03); }
        
        /* Ajuste: Nome em uma linha só */
        .produto-card h3 { font-size: 11px; font-weight: 400; letter-spacing: 3px; text-transform: uppercase; margin: 15px 0 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Ajuste: Valor Profissional */
        .preco-luxo { font-size: 14px; font-weight: 300; letter-spacing: 1px; color: #000; }

        /* MODAL / POP-UP LUXO */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); display: none; z-index: 1000; overflow-y: auto; }
        .modal-content { max-width: 900px; margin: 50px auto; padding: 40px; display: flex; gap: 50px; align-items: center; flex-wrap: wrap; }
        .modal-img { flex: 1; min-width: 300px; }
        .modal-img img { width: 100%; border-radius: 4px; }
        .modal-info { flex: 1; min-width: 300px; }
        .modal-info h2 { font-weight: 200; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px; }
        .modal-info .desc { font-size: 13px; line-height: 1.8; color: #666; margin-bottom: 30px; font-weight: 300; }
        .modal-info .price { font-size: 24px; font-weight: 200; margin-bottom: 40px; display: block; }
        
        /* Ajuste: Botão Carrinho Luxo */
        .btn-add-carrinho { width: 100%; background: #000; color: #fff; border: none; padding: 22px; font-size: 11px; letter-spacing: 5px; text-transform: uppercase; cursor: pointer; transition: 0.4s; }
        .btn-add-carrinho:hover { background: #A39684; }
        .close-modal { position: absolute; top: 30px; right: 40px; font-size: 30px; cursor: pointer; font-weight: 200; }

        footer { background: #000; color: #fff; padding: 80px 20px; text-align: center; }
        .footer-logo { font-weight: 200; letter-spacing: 10px; font-size: 20px; margin-bottom: 30px; }
    </style>
</head>
<body>

<header>
    <div class="logo">MeGusta</div>
    <div class="nav-filtros">
        <button class="btn-filtro active" data-cat="todos">TODOS</button>
        <button class="btn-filtro" data-cat="brincos">BRINCOS</button>
        <button class="btn-filtro" data-cat="colares">COLARES</button>
        <button class="btn-filtro" data-cat="aneis">ANÉIS</button>
    </div>
</header>

<main class="vitrine" id="vitrine"></main>

<div class="modal" id="modal-produto">
    <span class="close-modal" id="close-x">&times;</span>
    <div class="modal-content" id="modal-body"></div>
</div>

<footer><div class="footer-logo">MeGusta</div></footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDuV0zO-5M4IkpTqzwaWqvL15HCitqaXME", authDomain: "megusta-semijoias.firebaseapp.com", projectId: "megusta-semijoias", storageBucket: "megusta-semijoias.appspot.com", messagingSenderId: "998632232244", appId: "1:998632232244:web:45473970818b8374e20161" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let produtos = [];

    async function carregar() {
        const snap = await getDocs(query(collection(db, "produtos"), orderBy("dataCriacao", "desc")));
        produtos = snap.docs.map(d => ({id: d.id, ...d.data()}));
        render();
    }

    function render(cat = 'todos') {
        const v = document.getElementById('vitrine');
        v.innerHTML = '';
        const f = cat === 'todos' ? produtos : produtos.filter(p => p.categoria === cat);
        f.forEach(p => {
            const div = document.createElement('div');
            div.className = 'produto-card';
            div.innerHTML = `
                <div class="img-container"><img src="${p.imagens[0]}"></div>
                <h3>${p.nome}</h3>
                <div class="preco-luxo">${p.preco}</div>
            `;
            div.onclick = () => abrirModal(p);
            v.appendChild(div);
        });
    }

    function abrirModal(p) {
        const m = document.getElementById('modal-produto');
        const b = document.getElementById('modal-body');
        b.innerHTML = `
            <div class="modal-img"><img src="${p.imagens[0]}"></div>
            <div class="modal-info">
                <h2>${p.nome}</h2>
                <p class="desc">${p.descricao}</p>
                <span class="price">${p.preco}</span>
                <button class="btn-add-carrinho" onclick="window.location.href='https://wa.me/5511999999999?text=Gostaria de comprar: ${p.nome}'">Adicionar ao Pedido</button>
            </div>
        `;
        m.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    document.getElementById('close-x').onclick = () => {
        document.getElementById('modal-produto').style.display = 'none';
        document.body.style.overflow = 'auto';
    };

    document.querySelectorAll('.btn-filtro').forEach(btn => btn.onclick = (e) => {
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        render(e.target.dataset.cat);
    });

    carregar();
</script>
</body>
</html>
