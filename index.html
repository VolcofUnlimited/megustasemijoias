<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megusta Semijóias</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.2">
    <style>
        html, body { height: 100%; margin: 0; display: flex; flex-direction: column; }
        main.vitrine { flex: 1 0 auto; }
        footer { flex-shrink: 0; }
        .link-fendi { color: #A39684; text-decoration: none; font-size: 10px; letter-spacing: 2px; font-weight: 400; text-transform: uppercase; }
        .grade-produtos .produto-card .img-container { width: 100%; max-width: 280px; aspect-ratio: 1 / 1; margin: 0 auto 15px; overflow: hidden; background-color: #f9f9f9; position: relative; }
        .grade-produtos .produto-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        /* ESTILO ESGOTADO */
        .produto-card.esgotado { cursor: default; opacity: 0.7; }
        .produto-card.esgotado img { filter: grayscale(1); }
        .tag-esgotado { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.9); color: #000; font-size: 9px; 
            letter-spacing: 3px; padding: 10px 20px; text-transform: uppercase; font-weight: 700;
        }

        .grade-produtos .produto-card h3, #tituloModal { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; padding: 0 10px; box-sizing: border-box; }
        .preco-vitrine, #precoModal { font-family: 'Montserrat', sans-serif; letter-spacing: 2px; font-weight: 300 !important; color: #1a1a1a; }
        .btn-carrinho { background-color: rgba(163, 150, 132, 0.85) !important; color: #1a1a1a !important; font-weight: 700 !important; letter-spacing: 3px; padding: 18px 30px !important; border-radius: 50px !important; border: none; cursor: pointer; transition: 0.4s; width: 100%; font-size: 11px; text-transform: uppercase; }
        .btn-carrinho:hover { background-color: rgba(163, 150, 132, 1) !important; }
        .miniaturas-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .miniatura { width: 50px; height: 50px; border-radius: 4px; cursor: pointer; object-fit: cover; border: 1px solid #eee; opacity: 0.5; }
        .miniatura.active { opacity: 1; border-color: #A39684; }
        @media (max-width: 600px) { .grade-produtos { grid-template-columns: repeat(2, 1fr) !important; gap: 15px !important; padding: 10px !important; } .modal-flex { flex-direction: column; } }
    </style>
</head>
<body>
    <header>
        <div style="position: absolute; top: 10px; left: 20px; font-size: 9px; letter-spacing: 1px; color: #999;"><span id="user-info">OLÁ, VISITANTE</span></div>
        <div class="logo-container"><img src="Logo.png" alt="Megusta" class="logo"></div>
        <nav><ul id="menu-categorias"><li><a href="javascript:void(0)" onclick="window.filtrar('todos')">TODOS</a></li></ul></nav>
        <a href="carrinho.html" class="carrinho-topo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span id="contagem-carrinho">0</span>
        </a>
    </header>

    <main class="vitrine">
        <div id="container-titulo-categoria" class="titulo-categoria-fixed">
            <div class="brilho-icon">✦</div>
            <h1 id="nome-categoria-atual">TODOS OS PRODUTOS</h1>
            <p class="subtitulo-marca">MEGUSTA SEMIJÓIAS</p>
        </div>
        <div class="grade-produtos" id="lista-produtos"></div>
    </main>

    <footer>
        <div style="background-color: #F9F9F9; padding: 25px 10px; text-align: center; border-top: 1px solid #eee;">
            <div style="max-width: 600px; margin: 0 auto; display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;">
                <a href="#" class="link-fendi">Sobre a Empresa</a>
                <a href="https://wa.me/5511985906325" target="_blank" class="link-fendi">Contato</a>
                <a href="https://www.instagram.com/megusta_semijoias/" target="_blank" class="link-fendi">Instagram</a>
            </div>
        </div>
        <div style="background-color: #000; padding: 15px 10px; text-align: center;">
            <p style="font-size: 8px; letter-spacing: 2px; color: #FFFFFF; margin: 0; text-transform: uppercase;">© 2026 MEGUSTA SEMIJÓIAS - VOLCOF.UNLIMITED</p>
        </div>
    </footer>

    <div id="meuModal" class="modal">
        <div class="modal-conteudo">
            <span class="fechar" onclick="window.fecharModal()">&times;</span>
            <div class="modal-flex">
                <div class="img-modal-container" id="modalCarrossel"></div>
                <div class="info-produto-modal">
                    <h2 id="tituloModal"></h2>
                    <p id="precoModal" style="color:#D1BE9C; font-size: 20px;"></p>
                    <p id="descModal" style="color:#666; margin-bottom: 25px; line-height: 1.6;"></p>
                    <button class="btn-carrinho" id="btnAdicionarAoCarrinho">ADICIONAR AO CARRINHO</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDuV0zO-5M4IkpTqzwaWqvL15HCitqaXME", authDomain: "megusta-semijoias.firebaseapp.com", projectId: "megusta-semijoias", storageBucket: "megusta-semijoias.appspot.com", messagingSenderId: "998632232244", appId: "1:998632232244:web:45473970818b8374e20161" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let produtos = [];
        async function carregarTudo() {
            const prodSnap = await getDocs(query(collection(db, "produtos"), orderBy("dataCriacao", "desc")));
            produtos = prodSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderizar();
        }

        window.renderizar = function(cat = 'todos') {
            const container = document.getElementById('lista-produtos');
            container.innerHTML = '';
            const filtrados = cat === 'todos' ? produtos : produtos.filter(p => p.categoria.toLowerCase() === cat.toLowerCase());
            filtrados.forEach(p => {
                const card = document.createElement('div');
                const esgotado = p.estoque <= 0;
                card.className = `produto-card ${esgotado ? 'esgotado' : ''}`;
                card.innerHTML = `
                    <div class="img-container">
                        <img src="${p.imagens[0]}" loading="lazy">
                        ${esgotado ? '<div class="tag-esgotado">ESGOTADO</div>' : ''}
                    </div>
                    <h3>${p.nome}</h3>
                    <p class="preco-vitrine">${p.preco}</p>
                `;
                if (!esgotado) card.onclick = () => abrirModal(p);
                container.appendChild(card);
            });
            const carrinho = JSON.parse(localStorage.getItem('carrinho_megusta')) || [];
            document.getElementById('contagem-carrinho').innerText = carrinho.length;
        }

        function abrirModal(p) {
            document.getElementById('tituloModal').innerText = p.nome;
            document.getElementById('precoModal').innerText = p.preco;
            document.getElementById('descModal').innerText = p.descricao;
            const containerImg = document.getElementById('modalCarrossel');
            let slidesHtml = p.imagens.map(img => `<img src="${img}" style="width:100%; flex-shrink:0;">`).join('');
            containerImg.innerHTML = `<div style="overflow:hidden; width:100%;"><div id="slides" style="display:flex; transition:0.5s;">${slidesHtml}</div></div>`;
            if (p.imagens.length > 1) {
                let minHtml = '<div class="miniaturas-container">';
                p.imagens.forEach((img, i) => { minHtml += `<img src="${img}" class="miniatura ${i === 0 ? 'active' : ''}" onclick="window.mudarSlide(${i})">`; });
                containerImg.innerHTML += minHtml + '</div>';
            }
            document.getElementById('btnAdicionarAoCarrinho').onclick = () => {
                let carrinho = JSON.parse(localStorage.getItem('carrinho_megusta')) || [];
                // Salvamos o ID para dar baixa depois
                carrinho.push({ id: p.id, nome: p.nome, preco: p.preco, foto: p.imagens[0] });
                localStorage.setItem('carrinho_megusta', JSON.stringify(carrinho));
                window.renderizar();
                window.fecharModal();
            };
            document.getElementById('meuModal').style.display = 'block';
            window.mudarSlide = (index) => {
                document.getElementById('slides').style.transform = `translateX(-${index * 100}%)`;
                document.querySelectorAll('.miniatura').forEach((m, i) => m.classList.toggle('active', i === index));
            };
        }

        window.fecharModal = () => document.getElementById('meuModal').style.display = 'none';
        window.filtrar = (c) => renderizar(c);
        carregarTudo();
    </script>
</body>
</html>
