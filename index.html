<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS RESPONSIVOS --- */
        html, body { height: 100%; margin: 0; padding: 0; display: flex; flex-direction: column; background: #fff; font-family: 'Montserrat', sans-serif; color: #1a1a1a; -webkit-font-smoothing: antialiased; }
        main.vitrine { flex: 1 0 auto; }
        footer { flex-shrink: 0; }
        a { text-decoration: none; color: inherit; transition: 0.3s; }

        header { padding: 10px 15px; text-align: center; position: relative; border-bottom: 1px solid #f8f8f8; background: #fff; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { max-width: 130px; height: auto; transition: 0.3s; } 

        .header-right { display: flex; align-items: center; gap: 15px; flex: 1; justify-content: flex-end; }
        .icon-user, .icon-cart { width: 20px; height: 20px; color: #333; cursor: pointer; }
        .user-name-text { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: #1a1a1a; font-weight: 400; display: none; } 

        .nav-categorias { width: 100%; border-bottom: 1px solid #f8f8f8; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .nav-categorias::-webkit-scrollbar { display: none; }
        nav ul { display: flex; justify-content: center; gap: 20px; list-style: none; padding: 12px 15px; margin: 0; }
        nav ul li a { text-decoration: none; color: #333; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: 400; cursor: pointer; }

        #container-titulo-categoria { text-align: center; padding: 25px 0 5px; }
        #nome-categoria-atual { font-weight: 200; letter-spacing: 5px; text-transform: uppercase; font-size: 13px; color: #1a1a1a; margin: 0; }
        
        .grade-produtos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 1400px; margin: 0 auto; }
        .produto-card { text-align: center; cursor: pointer; position: relative; padding-bottom: 10px; }
        .img-container { width: 100%; aspect-ratio: 1 / 1; margin-bottom: 8px; overflow: hidden; background-color: #f9f9f9; }
        .produto-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .produto-card h3 { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; margin: 5px 0; font-weight: 300; }
        .produto-card.esgotado { filter: grayscale(1); opacity: 0.6; pointer-events: none; }
        .tag-esgotado { display: none; font-size: 8px; font-weight: 700; color: #ff4d4d; letter-spacing: 1px; }
        .produto-card.esgotado .tag-esgotado { display: block; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; align-items: flex-start; justify-content: center; }
        .modal-conteudo { width: 100%; max-width: 850px; padding: 20px; position: relative; }
        .fechar-modal { position: fixed; top: 15px; right: 20px; font-size: 30px; cursor: pointer; z-index: 2100; color: #ccc; }
        .btn-add-cart { background-color: rgba(163, 150, 132, 1); color: #fff; border: none; padding: 18px; border-radius: 50px; cursor: pointer; width: 100%; font-size: 10px; text-transform: uppercase; font-weight: 700; letter-spacing: 2px; }

        /* RODAPÉ AJUSTADO */
        .footer-links-row { background-color: #F9F9F9; padding: 25px 10px; text-align: center; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 15px; }
        .link-fendi { color: #A39684 !important; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }
        .footer-black-row { background: #000; padding: 20px; text-align: center; }
        .footer-black-row p { font-size: 7px; letter-spacing: 1px; color: #fff; margin: 0; text-transform: uppercase; }
        .footer-black-row strong { font-weight: 700; }

        @media (min-width: 768px) {
            header { padding: 15px 40px; }
            .logo { max-width: 160px; }
            .user-name-text { display: inline-block; }
            .grade-produtos { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; padding: 0 60px 80px; }
            .nav-categorias { overflow: hidden; }
            nav ul { padding: 15px 0; gap: 30px; }
            .modal { background: rgba(255,255,255,0.98); align-items: center; }
            .modal-conteudo { width: 90%; padding: 40px; box-shadow: 0 40px 100px rgba(0,0,0,0.05); }
            .footer-links-row { flex-direction: row; justify-content: center; gap: 40px; }
        }
    </style>
</head>
