<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megusta Semijóias</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.3">
    
    <style>
        /* RESET E ESTRUTURA STICKY FOOTER */
        html, body { height: 100%; margin: 0; padding: 0; display: flex; flex-direction: column; background: #fff; font-family: 'Montserrat', sans-serif; }
        main.vitrine { flex: 1 0 auto; }
        footer { flex-shrink: 0; width: 100%; }

        /* CABEÇALHO ULTRA COMPACTO */
        header { padding: 10px 0 5px; text-align: center; position: relative; border-bottom: 1px solid #f8f8f8; }
        .logo { max-width: 110px; height: auto; margin-bottom: 5px; } 
        nav ul { display: flex; justify-content: center; gap: 20px; list-style: none; padding: 0; margin: 5px 0; }
        nav ul li a { text-decoration: none; color: #999; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }
        
        /* LOGIN INFO TOPO */
        #user-info-container { position: absolute; top: 10px; left: 15px; font-size: 7px; color: #ccc; letter-spacing: 1px; text-align: left; }
        .btn-abrir-login { background: none; border: 1px solid #eee; padding: 3px 8px; border-radius: 20px; cursor: pointer; font-size: 7px; text-transform: uppercase; color: #999; margin-top: 2px; }
        .btn-logout { background: none; border: none; color: #A39684; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 7px; display: none; }

        .carrinho-topo { position: absolute; top: 10px; right: 20px; text-decoration: none; color: #000; display: flex; align-items: center; gap: 4px; }

        /* VITRINE LUXO (280px) */
        #container-titulo-categoria { text-align: center; padding: 25px 0 15px; }
        #nome-categoria-atual { font-weight: 200; letter-spacing: 6px; text-transform: uppercase; font-size: 14px; color: #bbb; margin: 0; }

        .grade-produtos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 40px; 
            padding: 20px 40px; 
            max-width: 1300px; 
            margin: 0 auto; 
        }
        .produto-card { text-align: center; cursor: pointer; transition: 0.3s; }
        .img-container { width: 100%; aspect-ratio: 1 / 1; margin: 0 auto 10px; overflow: hidden; background-color: #f9f9f9; }
        .produto-card img { width: 100%; height: 100%; object-fit: cover; }
        .produto-card h3 { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin: 8px 0; color: #000; }

        /* MODAL DE LOGIN/CADASTRO LUXO */
        .modal-auth { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 3000; align-items: center; justify-content: center; }
        .auth-card { background: #fff; width: 90%; max-width: 350px; padding: 40px; text-align: center; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border-radius: 20px; }
        .auth-card h2 { font-weight: 200; letter-spacing: 5px; text-transform: uppercase; font-size: 15px; margin-bottom: 30px; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 50px; outline: none; font-family: 'Montserrat'; font-size: 12px; text-align: center; box-sizing: border-box; }
        
        .btn-auth-submit { width: 100%; background: #000; color: #fff; border: none; padding: 14px; border-radius: 50px; cursor: pointer; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; font-weight: 700; }
        .btn-google-auth { width: 100%; background: #fff; color: #000; border: 1px solid #eee; padding: 12px; border-radius: 50px; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 700; margin-top: 20px; }
        .fechar-auth { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; font-weight: 200; color: #ccc; }

        /* RODAPÉ LUXO PROFISSIONAL */
        .footer-links-container { background-color: #F9F9F9; padding: 25px 10px; text-align: center; border-top: 1px solid #eee; }
        .link-fendi { color: #A39684 !important; text-decoration: none !important; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin: 0 15px; font-weight: 400; }
        .footer-black-bar { background-color: #000; padding: 12px; text-align: center; }
        .footer-black-bar p { font-size: 7px; letter-spacing: 2px; color: #FFFFFF; margin: 0; text-transform: uppercase; }
        .footer-black-bar strong { font-weight: 700; color: #FFFFFF; }

        .esgotado { opacity: 0.5; filter: grayscale(1); cursor: default !important; }

        @media (max-width: 600px) {
            .grade-produtos { grid-template-columns: repeat(2, 1fr); padding: 10px; gap: 15px; }
            .auth-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div id="user-info-container">
            <span id="user-status">BEM-VINDO</span><br>
            <button id="btn-abrir-auth" class="btn-abrir-login" onclick="window.abrirAuth()">Entrar / Cadastrar</button>
            <button id="btn-logout" class="btn-logout" onclick="window.fazerLogout()">[ Sair ]</button>
        </div>
        <div class="logo-container"><img src="Logo.png" alt="Megusta" class="logo"></div>
        <nav>
            <ul>
                <li><a href="javascript:void(0)" onclick="window.filtrar('todos')">TODOS</a></li>
                <li><a href="javascript:void(0)" onclick="window.filtrar('brincos')">BRINCOS</a></li>
                <li><a href="javascript:void(0)" onclick="window.filtrar('colares')">COLARES</a></li>
                <li><a href="javascript:void(0)" onclick="window.filtrar('pulseiras')">PULSEIRAS</a></li>
                <li><a href="javascript:void(0)" onclick="window.filtrar('aneis')">ANÉIS</a></li>
            </ul>
        </nav>
        <a href="carrinho.html" class="carrinho-topo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span id="contagem-carrinho" style="font-weight: 700; font-size: 10px;">0</span>
        </a>
    </header>

    <main class="vitrine">
        <div id="container-titulo-categoria"><h1 id="nome-categoria-atual">TODOS OS PRODUTOS</h1></div>
        <div class="grade-produtos" id="lista-produtos"></div>
    </main>

    <div id="modalAuth" class="modal-auth">
        <div class="auth-card">
            <span class="fechar-auth" onclick="window.fecharAuth()">&times;</span>
            <img src="Logo.png" style="max-width: 80px; margin-bottom: 20px;">
            <h2 id="auth-titulo">Acessar Conta</h2>
            
            <input type="email" id="auth-email" placeholder="E-MAIL">
            <input type="password" id="auth-pass" placeholder="SENHA">
            
            <button class="btn-auth-submit" onclick="window.authEmailSenha()">ENTRAR / CADASTRAR</button>
            
            <div style="margin: 20px 0; font-size: 9px; color: #ccc; letter-spacing: 2px;">OU</div>
            
            <button class="btn-google-auth" onclick="window.authGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16">
                ENTRAR COM GOOGLE
            </button>
            
            <p id="auth-msg" style="font-size: 9px; color: red; margin-top: 15px; letter-spacing: 1px;"></p>
        </div>
    </div>

    <footer>
        <div class="footer-links-container">
            <a href="#" class="link-fendi">Sobre</a>
            <a href="https://wa.me/5511985906325" target="_blank" class="link-fendi">Contato</a>
            <a href="https://www.instagram.com/megusta_semijoias/" target="_blank" class="link-fendi">Instagram</a>
        </div>
        <div class="footer-black-bar">
            <p>© 2026 MEGUSTA SEMIJÓIAS - DESENVOLVIDO POR <strong>VOLCOF.UNLIMITED</strong></p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDuV0zO-5M4IkpTqzwaWqvL15HCitqaXME", authDomain: "megusta-semijoias.firebaseapp.com", projectId: "megusta-semijoias", storageBucket: "megusta-semijoias.appspot.com", messagingSenderId: "998632232244", appId: "1:998632232244:web:45473970818b8374e20161" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // CONTROLE DO POP-UP
        window.abrirAuth = () => document.getElementById('modalAuth').style.display = 'flex';
        window.fecharAuth = () => { document.getElementById('modalAuth').style.display = 'none'; document.getElementById('auth-msg').innerText = ""; };

        // LOGIN COM GOOGLE
        window.authGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
                window.fecharAuth();
            } catch (e) { document.getElementById('auth-msg').innerText = "ERRO NA AUTENTICAÇÃO GOOGLE."; }
        };

        // LOGIN / CADASTRO HÍBRIDO
        window.authEmailSenha = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) { document.getElementById('auth-msg').innerText = "PREENCHA TODOS OS CAMPOS."; return; }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.fecharAuth();
            } catch (e) {
                if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
                    try {
                        await createUserWithEmailAndPassword(auth, email, pass);
                        window.fecharAuth();
                    } catch (err) { document.getElementById('auth-msg').innerText = "ERRO AO CRIAR CONTA."; }
                } else {
                    document.getElementById('auth-msg').innerText = "ERRO NO LOGIN. VERIFIQUE OS DADOS.";
                }
            }
        };

        window.fazerLogout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            const status = document.getElementById('user-status');
            const btnAbrir = document.getElementById('btn-abrir-auth');
            const btnSair = document.getElementById('btn-logout');
            if (user) {
                status.innerText = `OLÁ, ${user.displayName || user.email.split('@')[0].toUpperCase()}`;
                btnAbrir.style.display = 'none';
                btnSair.style.display = 'inline-block';
            } else {
                status.innerText = "BEM-VINDO";
                btnAbrir.style.display = 'inline-block';
                btnSair.style.display = 'none';
            }
        });

        // VITRINE
        let produtos = [];
        async function carregar() {
            const snap = await getDocs(query(collection(db, "produtos"), orderBy("dataCriacao", "desc")));
            produtos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderizar();
        }

        window.renderizar = function(cat = 'todos') {
            const container = document.getElementById('lista-produtos');
            document.getElementById('nome-categoria-atual').innerText = cat === 'todos' ? 'TODOS OS PRODUTOS' : cat.toUpperCase();
            container.innerHTML = '';
            const filtrados = cat === 'todos' ? produtos : produtos.filter(p => p.categoria.toLowerCase() === cat.toLowerCase());
            
            filtrados.forEach(p => {
                const esgotado = p.estoque <= 0;
                const card = document.createElement('div');
                card.className = `produto-card ${esgotado ? 'esgotado' : ''}`;
                card.innerHTML = `<div class="img-container"><img src="${p.imagens[0]}" loading="lazy"></div><h3>${p.nome}</h3><p style="font-weight:700; font-size:11px;">${p.preco}</p>`;
                if (!esgotado) card.onclick = () => window.location.href = `carrinho.html?add=${p.id}`; // Exemplo de fluxo
                container.appendChild(card);
            });
            document.getElementById('contagem-carrinho').innerText = (JSON.parse(localStorage.getItem('carrinho_megusta')) || []).length;
        }

        window.filtrar = (c) => renderizar(c);
        carregar();
    </script>
</body>
</html>
