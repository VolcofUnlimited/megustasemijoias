<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megusta Semijóias</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.2">
    
    <style>
        /* Estrutura para fixar o rodapé no final */
        html, body {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        main.vitrine {
            flex: 1 0 auto;
        }
        footer {
            flex-shrink: 0;
        }
        /* Estilo para os links em Fendi */
        .link-fendi {
            color: #A39684; /* Tom Fendi Clássico */
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 2px;
            font-weight: 400;
            text-transform: uppercase;
        }

        /* Ajuste solicitado: Nome do produto em uma só linha */
        .grade-produtos .produto-card h3 {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            padding: 0 10px;
            box-sizing: border-box;
        }

        /* Ajuste: Aspecto Luxo no Pop-up */
        #precoModal {
            letter-spacing: 2px;
            font-weight: 300 !important; /* Visual mais leve e elegante */
            margin-bottom: 15px;
        }
        .btn-carrinho {
            background-color: #000 !important;
            color: #fff !important;
            letter-spacing: 3px;
            font-weight: 400;
            padding: 18px !important;
            transition: 0.4s;
            border-radius: 0; /* Aspecto mais luxuoso e retilíneo */
        }
        .btn-carrinho:hover {
            background-color: #A39684 !important;
        }
    </style>
</head>
<body>
    <header>
        <div style="position: absolute; top: 10px; left: 20px; font-size: 9px; letter-spacing: 1px; color: #999;">
            <span id="user-info">CARREGANDO...</span>
            <button id="btn-logout" style="display:none; background:none; border:none; color:#D1BE9C; cursor:pointer; font-weight:700; margin-left:5px;">[ SAIR ]</button>
        </div>

        <div class="logo-container">
            <img src="Logo.png" alt="Megusta" class="logo">
        </div>
        <nav>
            <ul>
                <li><a href="javascript:void(0)" onclick="window.filtrar('todos')">TODOS</a></li>
                <li><a href="javascript:void(0)" onclick="window.filtrar('brincos')">BRINCOS</a></li>
                <li><a href="javascript:void(0)" onclick="window.filtrar('colares')">COLARES</a></li>
                <li><a href="javascript:void(0)" onclick="window.filtrar('pulseiras')">PULSEIRAS</a></li>
                <li><a href="javascript:void(0)" onclick="window.filtrar('aneis')">ANÉIS</a></li>
            </ul>
        </nav>
        <a href="carrinho.html" class="carrinho-topo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span id="contagem-carrinho">0</span>
        </a>
    </header>

    <main class="vitrine">
        <div id="container-titulo-categoria" class="titulo-categoria-fixed">
            <div class="brilho-icon">✦</div>
            <h1 id="nome-categoria-atual">TODOS OS PRODUTOS</h1>
            <p class="subtitulo-marca">MEGUSTA SEMIJÓIAS</p>
        </div>
        <div class="grade-produtos" id="lista-produtos"></div>
    </main>

    <footer>
        <div style="background-color: #F9F9F9; padding: 25px 10px; text-align: center; border-top: 1px solid #eee;">
            <div style="max-width: 600px; margin: 0 auto; display: flex; justify-content: center; gap: 40px;">
                <a href="#" class="link-fendi">Sobre a Empresa</a>
                <a href="https://wa.me/5511985906325" target="_blank" class="link-fendi">Contato</a>
                <a href="https://www.instagram.com/megustasemijoias/" target="_blank" class="link-fendi">Instagram</a>
            </div>
        </div>

        <div style="background-color: #000; padding: 15px 10px; text-align: center;">
            <p style="font-size: 8px; letter-spacing: 2px; color: #FFFFFF; margin: 0; text-transform: uppercase; font-weight: 300;">
                © 2026 MEGUSTA SEMIJÓIAS - DESENVOLVIDO POR <strong style="font-weight: 700; color: #FFFFFF;">VOLCOF.UNLIMITED</strong>
            </p>
        </div>
    </footer>

    <div id="meuModal" class="modal">
        <div class="modal-conteudo">
            <span class="fechar" onclick="window.fecharModal()">&times;</span>
            <div class="modal-flex">
                <div class="img-modal-container"></div>
                <div class="info-produto-modal">
                    <h2 id="tituloModal"></h2>
                    <p id="precoModal" style="color:#D1BE9C; font-size: 20px;"></p>
                    <p id="descModal" style="color:#666; margin-bottom: 25px; line-height: 1.6;"></p>
                    <button class="btn-carrinho" id="btnAdicionarAoCarrinho">ADICIONAR AO CARRINHO</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
