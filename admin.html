<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Megusta - Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F9F9F9; font-family: 'Montserrat', sans-serif; margin: 0; padding: 40px 20px; }
        .admin-card { background: #fff; width: 100%; max-width: 600px; padding: 40px; border-radius: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.04); margin: 0 auto 40px; }
        h2 { text-align: center; letter-spacing: 6px; font-weight: 200; text-transform: uppercase; font-size: 18px; margin-bottom: 30px; }
        .field-group { margin-bottom: 20px; }
        label { display: block; font-size: 9px; letter-spacing: 2px; color: #A39684; text-transform: uppercase; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 12px; font-family: 'Montserrat', sans-serif; font-size: 13px; outline: none; box-sizing: border-box; }
        textarea { resize: none; height: 80px; }
        .fotos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .foto-preview { width: 100%; height: 80px; border-radius: 10px; object-fit: cover; border: 1px solid #eee; display: none; }
        .btn-cadastrar { width: 100%; background: #000; color: #fff; border: none; padding: 18px; border-radius: 60px; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-cadastrar:hover { background: #A39684; }
        .produto-item { background: #fff; padding: 15px; border-radius: 20px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 5px 15px rgba(0,0,0,0.02); max-width: 600px; margin: 0 auto; }
        .produto-info { display: flex; align-items: center; gap: 12px; }
        .produto-info img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        .acoes { display: flex; gap: 10px; }
        .btn-edit { background: #f0f0f0; border: none; padding: 8px 12px; border-radius: 8px; font-size: 8px; cursor: pointer; text-transform: uppercase; }
        .btn-del { background: #ffebeb; color: #ff4d4d; border: none; padding: 8px 12px; border-radius: 8px; font-size: 8px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2 id="titulo-form">Novo Cadastro</h2>
    <form id="form-produto">
        <input type="hidden" id="edit-id">
        <div class="field-group"><label>Nomenclatura</label><input type="text" id="nome" required></div>
        <div class="field-group"><label>Descrição</label><textarea id="descricao" required></textarea></div>
        <div style="display: flex; gap: 15px;">
            <div class="field-group" style="flex: 2;">
                <label>Categoria</label>
                <select id="categoria">
                    <option value="brincos">BRINCOS</option><option value="colares">COLARES</option>
                    <option value="pulseiras">PULSEIRAS</option><option value="aneis">ANÉIS</option>
                    <option value="nova">+ NOVA CATEGORIA</option>
                </select>
                <input type="text" id="nova-cat-input" style="display:none; margin-top:10px;" placeholder="Nome da categoria">
            </div>
            <div class="field-group" style="flex: 1;"><label>Estoque</label><input type="number" id="estoque" required></div>
        </div>
        <div class="field-group"><label>Valor de Venda</label><input type="text" id="preco" required></div>
        <div class="field-group">
            <label>Links Postimages (Link Direto)</label>
            <input type="text" id="url-img-1" required placeholder="Link 1" style="margin-bottom:5px">
            <input type="text" id="url-img-2" placeholder="Link 2" style="margin-bottom:5px">
            <input type="text" id="url-img-3" placeholder="Link 3">
            <div class="fotos-grid">
                <img id="prev-1" class="foto-preview"><img id="prev-2" class="foto-preview"><img id="prev-3" class="foto-preview">
            </div>
        </div>
        <button type="submit" id="btn-submit" class="btn-cadastrar">CADASTRAR PRODUTO</button>
        <button type="button" id="btn-cancelar" style="display:none; width:100%; background:none; border:none; font-size:9px; margin-top:10px; cursor:pointer; color:#999; text-transform:uppercase;">Cancelar Edição</button>
    </form>
</div>

<div id="lista-estoque"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, getDocs, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDuV0zO-5M4IkpTqzwaWqvL15HCitqaXME", authDomain: "megusta-semijoias.firebaseapp.com", projectId: "megusta-semijoias", storageBucket: "megusta-semijoias.appspot.com", messagingSenderId: "998632232244", appId: "1:998632232244:web:45473970818b8374e20161" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const inputPreco = document.getElementById('preco');
    inputPreco.value = "R$ 0,00";
    inputPreco.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        v = (parseInt(v || 0) / 100).toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
        e.target.value = v;
    });

    [1,2,3].forEach(n => {
        document.getElementById(`url-img-${n}`).addEventListener('input', (e) => {
            const img = document.getElementById(`prev-${n}`);
            img.src = e.target.value; img.style.display = e.target.value ? 'block' : 'none';
        });
    });

    async function carregar() {
        const snap = await getDocs(query(collection(db, "produtos"), orderBy("dataCriacao", "desc")));
        const list = document.getElementById('lista-estoque');
        list.innerHTML = '';
        snap.forEach(res => {
            const p = res.data();
            list.innerHTML += `<div class="produto-item"><div class="produto-info"><img src="${p.imagens[0]}"><div><b>${p.nome}</b><br><small>${p.preco} | ${p.categoria}</small></div></div><div class="acoes"><button class="btn-edit" data-id="${res.id}">Editar</button><button class="btn-del" data-id="${res.id}">Excluir</button></div></div>`;
        });
        document.querySelectorAll('.btn-edit').forEach(b => b.onclick = () => editar(b.dataset.id));
        document.querySelectorAll('.btn-del').forEach(b => b.onclick = async () => { if(confirm("Excluir?")) { await deleteDoc(doc(db, "produtos", b.dataset.id)); carregar(); }});
    }

    async function editar(id) {
        const snap = await getDocs(collection(db, "produtos"));
        const p = snap.docs.find(d => d.id === id).data();
        document.getElementById('edit-id').value = id;
        document.getElementById('nome').value = p.nome;
        document.getElementById('descricao').value = p.descricao;
        document.getElementById('categoria').value = p.categoria;
        document.getElementById('estoque').value = p.estoque;
        document.getElementById('preco').value = p.preco;
        p.imagens.forEach((url, i) => { 
            document.getElementById(`url-img-${i+1}`).value = url;
            document.getElementById(`prev-${i+1}`).src = url;
            document.getElementById(`prev-${i+1}`).style.display = 'block';
        });
        document.getElementById('titulo-form').innerText = "Editar Produto";
        document.getElementById('btn-submit').innerText = "ATUALIZAR";
        document.getElementById('btn-cancelar').style.display = 'block';
        window.scrollTo(0,0);
    }

    document.getElementById('btn-cancelar').onclick = () => location.reload();

    document.getElementById('form-produto').addEventListener('submit', async (e) => {
        e.preventDefault();
        const editId = document.getElementById('edit-id').value;
        const imgs = [1,2,3].map(n => document.getElementById(`url-img-${n}`).value).filter(u => u);
        const cat = document.getElementById('categoria').value;
        const pData = {
            nome: document.getElementById('nome').value.toUpperCase(),
            descricao: document.getElementById('descricao').value,
            categoria: cat === 'nova' ? document.getElementById('nova-cat-input').value.toLowerCase() : cat.toLowerCase(),
            preco: inputPreco.value,
            estoque: parseInt(document.getElementById('estoque').value),
            imagens: imgs,
            dataCriacao: serverTimestamp()
        };
        if(editId) { await updateDoc(doc(db, "produtos", editId), pData); }
        else { await addDoc(collection(db, "produtos"), pData); }
        location.reload();
    });
    carregar();
</script>
</body>
</html>
