<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo | MeGusta</title>
</head>
<body>
    <div class="container">
        <h2>Cadastro de Produtos</h2>
        <input type="hidden" id="edit-id">
        <input type="text" id="nome" placeholder="Nome do Produto">
        <input type="text" id="preco" placeholder="Preço (Ex: R$ 100,00)">
        <input type="text" id="select-categoria" placeholder="Categoria (Ex: Brincos)">
        <input type="number" id="estoque" placeholder="Quantidade em Estoque">
        <textarea id="descricao" placeholder="Descrição"></textarea>
        <input type="text" id="img1" placeholder="URL Imagem 1">
        <input type="text" id="img2" placeholder="URL Imagem 2">
        <input type="text" id="img3" placeholder="URL Imagem 3">
        <button id="btn-acao" onclick="window.salvarProduto()">SALVAR PRODUTO</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDuV0zO-5M4IkpTqzwaWqvL15HCitqaXME", authDomain: "megusta-semijoias.firebaseapp.com", projectId: "megusta-semijoias", storageBucket: "megusta-semijoias.appspot.com", messagingSenderId: "998632232244", appId: "1:998632232244:web:45473970818b8374e20161" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.salvarProduto = async () => {
            const id = document.getElementById('edit-id').value;
            const imgs = [document.getElementById('img1').value, document.getElementById('img2').value, document.getElementById('img3').value].filter(u => u.trim() !== "");
            
            // NORMALIZAÇÃO: Remove espaços nas pontas e coloca tudo em minúsculas
            const categoriaNormalizada = document.getElementById('select-categoria').value.trim().toLowerCase();
            
            const dados = {
                nome: document.getElementById('nome').value,
                preco: document.getElementById('preco').value,
                categoria: categoriaNormalizada,
                estoque: parseInt(document.getElementById('estoque').value || 0),
                descricao: document.getElementById('descricao').value,
                imagens: imgs
            };

            if(id) { 
                await updateDoc(doc(db, "produtos", id), dados); 
                alert("Produto Atualizado!"); 
            } else { 
                dados.dataCriacao = serverTimestamp(); 
                await addDoc(collection(db, "produtos"), dados); 
                alert("Produto Cadastrado!"); 
            }
            location.reload();
        };
    </script>
</body>
</html>
