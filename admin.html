<div class="admin-card">
    <h2>Novo Cadastro</h2>
    <form id="form-produto">
        <div class="field-group">
            <label>Nomenclatura da Joia</label>
            <input type="text" id="nome" required placeholder="EX: ANEL SOLITÁRIO">
        </div>

        <div style="display: flex; gap: 20px;">
            <div class="field-group" style="flex: 2;">
                <label>Categoria</label>
                <select id="categoria">
                    <option value="brincos">BRINCOS</option>
                    <option value="colares">COLARES</option>
                    <option value="pulseiras">PULSEIRAS</option>
                    <option value="aneis">ANÉIS</option>
                    <option value="nova">+ CADASTRAR NOVA...</option>
                </select>
                <input type="text" id="nova-cat-input" style="display:none; margin-top:10px;" placeholder="Qual a nova categoria?">
            </div>
            <div class="field-group" style="flex: 1;">
                <label>Estoque</label>
                <input type="number" id="estoque" required min="0" placeholder="0">
            </div>
        </div>

        <div class="field-group">
            <label>Valor de Venda</label>
            <input type="text" id="preco" required placeholder="R$ 0,00">
        </div>

        <div class="field-group">
            <label>Link da Imagem (Postimages)</label>
            <input type="text" id="url-img" required placeholder="Cole o 'Link Direto' aqui">
            <div id="preview-container" style="width: 100%; height: 150px; border: 1px dashed #ddd; border-radius: 15px; margin-top: 10px; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #fafafa;">
                <img id="img-preview" src="" style="max-height: 100%; display: none;">
                <span id="placeholder-text" style="color: #ccc; font-size: 10px; text-transform: uppercase;">Aguardando Link...</span>
            </div>
        </div>

        <button type="submit" id="btn-submit" class="btn-cadastrar">CADASTRAR PRODUTO</button>
    </form>
    <a href="index.html" style="display:block; text-align:center; margin-top:30px; font-size:10px; color:#bbb; text-decoration:none; letter-spacing:1px;">← RETORNAR AO SITE</a>
</div>

<script type="module" src="admin.js"></script>
