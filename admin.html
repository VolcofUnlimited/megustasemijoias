<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Administrativo | MeGusta</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* O conteúdo inicia escondido para evitar "flash" de conteúdo antes da verificação do login */
        body { font-family: 'Montserrat', sans-serif; background: #f4f4f4; margin: 0; padding: 0; display: none; flex-direction: column; min-height: 100vh; }
        .container { width: 100%; max-width: 1000px; margin: 0 auto; background: #fff; padding: 20px; box-sizing: border-box; flex: 1; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid #eee; position: relative; }
        .logo-admin { max-width: 120px; }
        .btn-logout-admin { position: absolute; right: 20px; top: 30px; background: none; border: 1px solid #ddd; padding: 5px 10px; cursor: pointer; font-size: 10px; text-transform: uppercase; border-radius: 4px; }
        
        h1 { font-weight: 300; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; margin: 20px 0; }
        .section-admin { margin-bottom: 30px; padding: 15px; border: 1px solid #eee; border-radius: 8px; background: #fafafa; }
        .form-group { display: flex; flex-direction: column; gap: 12px; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Montserrat'; font-size: 14px; width: 100%; box-sizing: border-box; }
        .btn-black { background: #1a1a1a; color: #fff; border: none; padding: 15px; cursor: pointer; text-transform: uppercase; font-weight: 700; width: 100%; border-radius: 6px; font-size: 12px; letter-spacing: 1px; }
        
        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; background: #eee; padding: 10px; font-size: 10px; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 12px; }
        
        .footer-black-row { background: #000; padding: 15px; text-align: center; }
        .footer-black-row p { font-size: 7px; letter-spacing: 1px; color: #fff; margin: 0; text-transform: uppercase; }

        @media (min-width: 768px) {
            body { padding: 0; }
            .container { margin: 40px auto; padding: 40px; border-radius: 8px; }
            .form-group { grid-template-columns: 1fr 1fr; display: grid; }
            .full-row { grid-column: span 2; }
            h1 { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="Logo.png" class="logo-admin" alt="MeGusta">
        <button class="btn-logout-admin" onclick="window.fazerLogout()">Sair</button>
    </header>

    <div class="section-admin">
        <h1>1. Categorias</h1>
        <div class="form-group">
            <input type="text" id="nova-cat-nome" placeholder="Nome da Categoria">
            <button class="btn-black" onclick="window.salvarCategoria()">Adicionar</button>
        </div>
        <div id="lista-categorias-admin" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:15px;"></div>
    </div>

    <div class="section-admin">
        <h1 id="titulo-form">2. Produtos</h1>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <input type="text" id="nome" placeholder="Nome do Produto">
            <input type="text" id="preco" placeholder="R$ 0,00" oninput="window.mascaraMoeda(this)">
            <select id="select-categoria"></select>
            <input type="number" id="estoque" placeholder="Quantidade">
            <textarea id="descricao" class="full-row" placeholder="Descrição"></textarea>
            <input type="text" id="img1" class="full-row" placeholder="Imagem 1 (Principal)">
            <input type="text" id="img2" class="full-row" placeholder="Imagem 2 (Opcional)">
            <input type="text" id="img3" class="full-row" placeholder="Imagem 3 (Opcional)">
            <button id="btn-acao" class="btn-black full-row" onclick="window.salvarProduto()">Salvar Produto</button>
        </div>
    </div>

    <h1>Inventário Ativo</h1>
    <div class="table-wrapper">
        <table>
            <thead><tr><th>Foto</th><th>Nome</th><th>Cat</th><th>Qtd</th><th>Ações</th></tr></thead>
            <tbody id="tabela-produtos"></tbody>
        </table>
    </div>
</div>

<div class="footer-black-row">
    <p>© 2026 MeGusta Semijóias – Fine Jewelry. By <strong>VOLCOF.UNLIMITED</strong></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDuV0zO-5M4IkpTqzwaWqvL15HCitqaXME", authDomain: "megusta-semijoias.firebaseapp.com", projectId: "megusta-semijoias", storageBucket: "megusta-semijoias.appspot.com", messagingSenderId: "998632232244", appId: "1:998632232244:web:45473970818b8374e20161" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- SEGURANÇA: ACESSO EXCLUSIVO ---
    const EMAIL_AUTORIZADO = "semijoiasmegusta@gmail.com";

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === EMAIL_AUTORIZADO) {
            document.body.style.display = "flex"; // Libera visualização
            carregarTudo();
        } else {
            alert("ACESSO RESTRITO. Faça login com a conta administrativa.");
            window.location.href = "login.html"; // Redireciona para o login
        }
    });

    window.fazerLogout = () => signOut(auth).then(() => window.location.href = "index.html");

    // MÁSCARA MOEDA
    window.mascaraMoeda = (i) => {
        let v = i.value.replace(/\D/g, "");
        v = (v / 100).toFixed(2).replace(".", ",");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = "R$ " + v;
    };

    // CATEGORIAS
    window.salvarCategoria = async () => {
        const n = document.getElementById('nova-cat-nome').value.toLowerCase().trim();
        if(n) await addDoc(collection(db, "categorias"), { nome: n });
        carregarTudo();
    };

    // CARREGAR DADOS
    async function carregarTudo() {
        const cats = await getDocs(collection(db, "categorias"));
        const listaCat = document.getElementById('lista-categorias-admin');
        const selCat = document.getElementById('select-categoria');
        listaCat.innerHTML = "";
        selCat.innerHTML = '<option value="">Categoria</option>';
        cats.forEach(d => {
            const n = d.data().nome;
            listaCat.innerHTML += `<span style="background:#eee; padding:5px 10px; border-radius:20px; font-size:9px;">${n.toUpperCase()} <b style="color:red; cursor:pointer;" onclick="window.removerCat('${d.id}')">X</b></span>`;
            selCat.innerHTML += `<option value="${n}">${n.toUpperCase()}</option>`;
        });

        const prods = await getDocs(query(collection(db, "produtos"), orderBy("dataCriacao", "desc")));
        const tabela = document.getElementById('tabela-produtos');
        tabela.innerHTML = "";
        prods.forEach(d => {
            const p = d.data();
            const pStr = JSON.stringify(p).replace(/"/g, '&quot;');
            tabela.innerHTML += `<tr>
                <td><img src="${p.imagens[0]}" style="width:30px;"></td>
                <td>${p.nome}</td>
                <td>${p.categoria}</td>
                <td style="color:${p.estoque <= 0 ? 'red' : 'inherit'}">${p.estoque}</td>
                <td><button onclick='window.editar("${d.id}", ${pStr})' style="color:blue; border:none; background:none; font-size:10px; cursor:pointer;">EDITAR</button> <button onclick="window.removerProd('${d.id}')" style="color:red; border:none; background:none; font-size:10px; cursor:pointer;">DEL</button></td>
            </tr>`;
        });
    }

    window.removerCat = async (id) => { if(confirm("Remover?")) { await deleteDoc(doc(db, "categorias", id)); carregarTudo(); } };

    window.salvarProduto = async () => {
        const id = document.getElementById('edit-id').value;
        const imgs = [document.getElementById('img1').value, document.getElementById('img2').value, document.getElementById('img3').value].filter(u => u.trim() !== "");
        const dados = {
            nome: document.getElementById('nome').value,
            preco: document.getElementById('preco').value,
            categoria: document.getElementById('select-categoria').value,
            estoque: parseInt(document.getElementById('estoque').value || 0),
            descricao: document.getElementById('descricao').value,
            imagens: imgs
        };
        if(id) { await updateDoc(doc(db, "produtos", id), dados); alert("Atualizado!"); }
        else { dados.dataCriacao = serverTimestamp(); await addDoc(collection(db, "produtos"), dados); alert("Cadastrado!"); }
        window.limparForm();
        carregarTudo();
    };

    window.editar = (id, p) => {
        document.getElementById('edit-id').value = id;
        document.getElementById('nome').value = p.nome;
        document.getElementById('preco').value = p.preco;
        document.getElementById('select-categoria').value = p.categoria;
        document.getElementById('estoque').value = p.estoque;
        document.getElementById('descricao').value = p.descricao;
        document.getElementById('img1').value = p.imagens[0] || "";
        document.getElementById('img2').value = p.imagens[1] || "";
        document.getElementById('img3').value = p.imagens[2] || "";
        document.getElementById('btn-acao').innerText = "ATUALIZAR PRODUTO";
        window.scrollTo(0,0);
    };

    window.limparForm = () => {
        document.getElementById('edit-id').value = "";
        document.getElementById('nome').value = "";
        document.getElementById('preco').value = "";
        document.getElementById('estoque').value = "";
        document.getElementById('descricao').value = "";
        document.getElementById('img1').value = "";
        document.getElementById('img2').value = "";
        document.getElementById('img3').value = "";
        document.getElementById('btn-acao').innerText = "SALVAR PRODUTO";
    };

    window.removerProd = async (id) => { if(confirm("Excluir?")) { await deleteDoc(doc(db, "produtos", id)); carregarTudo(); } };

</script>
</body>
</html>
