<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Megusta</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; padding: 50px; background: #f4f4f4; display: none; } 
        .box { background: #fff; padding: 30px; border-radius: 8px; max-width: 600px; margin: 0 auto 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-transform: uppercase; letter-spacing: 2px; font-size: 18px; margin-bottom: 20px; border-bottom: 2px solid #D1BE9C; display: inline-block; }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; box-sizing: border-box; border-radius: 4px; font-family: 'Montserrat'; }
        button { background: #222; color: #fff; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #D1BE9C; }
        table { width: 100%; border-collapse: collapse; background: #fff; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; font-size: 13px; }
        .btn-excluir { background: none; color: red; border: 1px solid red; padding: 5px 10px; font-size: 10px; width: auto; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="saudacao-admin">Verificando Permissões...</h2>
        <form id="form-produto">
            <input type="text" id="nome" placeholder="Nome do Produto" required>
            <input type="text" id="preco" placeholder="R$ 0,00" required>
            <select id="categoria">
                <option value="BRINCOS">BRINCOS</option>
                <option value="COLARES">COLARES</option>
                <option value="PULSEIRAS">PULSEIRAS</option>
                <option value="ANEIS">ANEIS</option>
            </select>
            <input type="number" id="estoque" placeholder="Estoque" required>
            <input type="file" id="input-imagens" multiple required>
            <textarea id="descricao" placeholder="Descrição" rows="3"></textarea>
            <button type="submit" id="btnSalvar">Salvar no Google Cloud</button>
        </form>
    </div>
    
    <div class="box" style="max-width: 800px;">
        <table>
            <thead><tr><th>Produto</th><th>Estoque</th><th>Ações</th></tr></thead>
            <tbody id="tabela-produtos"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuV0zO-5M4IkpTqzwaWqvL15HCitqaXME",
            authDomain: "megusta-semijoias.firebaseapp.com",
            projectId: "megusta-semijoias",
            storageBucket: "megusta-semijoias.firebasestorage.app",
            messagingSenderId: "998632232244",
            appId: "1:998632232244:web:45473970818b8374e20161"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, "produtos");

        // --- ⚠️ AJUSTE SEU E-MAIL AQUI ---
        const EMAIL_ADMIN_AUTORIZADO = "semijoiasmegusta@gmail.com"; 

        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Usuário logado:", user.email);
                if (user.email === EMAIL_ADMIN_AUTORIZADO) {
                    document.body.style.display = "block";
                    document.getElementById('saudacao-admin').innerText = "Olá, Rafa!";
                } else {
                    alert("Atenção: Você está logado como " + user.email + ", mas o e-mail autorizado no código é " + EMAIL_ADMIN_AUTORIZADO + ". O acesso foi negado.");
                    window.location.href = "index.html";
                }
            } else {
                alert("Nenhum usuário logado. Redirecionando para login...");
                window.location.href = "login.html";
            }
        });

        // Máscara de preço
        const inputPreco = document.getElementById('preco');
        inputPreco.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            v = (v / 100).toFixed(2).replace(".", ",");
            e.target.value = "R$ " + v;
        });

        document.getElementById('form-produto').onsubmit = async (e) => {
            e.preventDefault();
            const files = document.getElementById('input-imagens').files;
            const cat = document.getElementById('categoria').value;
            const caminhos = Array.from(files).map(f => `${cat}/${f.name}`);
            try {
                await addDoc(colRef, {
                    nome: document.getElementById('nome').value,
                    preco: document.getElementById('preco').value,
                    categoria: cat.toLowerCase(),
                    estoque: parseInt(document.getElementById('estoque').value),
                    imagens: caminhos,
                    descricao: document.getElementById('descricao').value,
                    dataCriacao: Date.now()
                });
                e.target.reset();
                alert("Cadastrado!");
            } catch (err) { alert(err.message); }
        };

        onSnapshot(query(colRef, orderBy("dataCriacao", "desc")), (snap) => {
            const t = document.getElementById('tabela-produtos');
            t.innerHTML = "";
            snap.docs.forEach(d => {
                t.innerHTML += `<tr><td>${d.data().nome}</td><td>${d.data().estoque}</td><td><button class="btn-excluir" onclick="window.excluir('${d.id}')">Excluir</button></td></tr>`;
            });
        });

        window.excluir = async (id) => { if(confirm("Excluir?")) await deleteDoc(doc(db, "produtos", id)); };
    </script>
</body>
</html>
