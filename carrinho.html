<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Carrinho - MeGusta Semijóias</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #fff; margin: 0; padding: 0; text-align: center; color: #1a1a1a; }
        header { padding: 20px; border-bottom: 1px solid #f2f2f2; }
        .logo { max-width: 130px; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 15px; box-sizing: border-box; }
        h1 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; font-size: 14px; color: #999; margin-bottom: 30px; }
        
        .item-carrinho { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; gap: 15px; }
        .item-info { display: flex; align-items: center; gap: 15px; text-align: left; flex: 1; }
        .item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 2px; }
        .item-detalhes h3 { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; margin: 0; font-weight: 400; }
        
        .controles-qtd { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .btn-qtd { background: #f4f4f4; border: none; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 16px; }
        .qtd-numero { font-size: 11px; font-weight: 700; min-width: 15px; text-align: center; }

        .btn-remover { background: none; border: none; color: #A39684; font-size: 8px; text-transform: uppercase; cursor: pointer; padding: 0; margin-top: 8px; font-weight: 700; }
        
        .resumo { margin-top: 30px; text-align: right; border-top: 2px solid #1a1a1a; padding-top: 20px; }
        .total-label { font-size: 8px; color: #ccc; letter-spacing: 2px; text-transform: uppercase; }
        .total-valor { font-size: 20px; font-weight: 300; color: #1a1a1a; display: block; margin-top: 5px; }
        
        .btn-finalizar { width: 100%; background-color: rgba(163, 150, 132, 1); color: #fff; border: none; padding: 18px; border-radius: 50px; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; font-weight: 700; margin-top: 25px; }

        .modal-sucesso { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; align-items: center; justify-content: center; }
        .modal-sucesso-content { padding: 30px; text-align: center; }

        @media (min-width: 768px) {
            header { padding: 30px; }
            .logo { max-width: 160px; }
            h1 { font-size: 18px; }
            .item-img { width: 80px; height: 80px; }
            .item-detalhes h3 { font-size: 11px; }
            .total-valor { font-size: 24px; }
        }
    </style>
</head>
<body>
    <header><img src="Logo.png" class="logo" alt="MeGusta"></header>

    <div class="container">
        <h1>Meu Carrinho</h1>
        <div id="lista-carrinho"></div>
        <div class="resumo">
            <span class="total-label">Total do Pedido</span>
            <span class="total-valor" id="valor-total">R$ 0,00</span>
        </div>
        <button class="btn-finalizar" onclick="window.confirmarPedido()">Finalizar sua compra</button>
        <a href="index.html" style="display:block; margin-top:25px; font-size:9px; color:#bbb; text-decoration:none; text-transform:uppercase; letter-spacing:2px;">Continuar Comprando</a>
    </div>

    <div id="modalSucesso" class="modal-sucesso">
        <div class="modal-sucesso-content">
            <img src="Logo.png" style="width: 100px; margin-bottom: 20px;">
            <p style="font-size:13px; line-height:1.6; color:#666;">Obrigado pela sua compra! Agora alguém do nosso time entrará em contato com você. Volte sempre.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDuV0zO-5M4IkpTqzwaWqvL15HCitqaXME", authDomain: "megusta-semijoias.firebaseapp.com", projectId: "megusta-semijoias", storageBucket: "megusta-semijoias.appspot.com", messagingSenderId: "998632232244", appId: "1:998632232244:web:45473970818b8374e20161" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.renderizarCarrinho = function() {
            const container = document.getElementById('lista-carrinho');
            const totalElement = document.getElementById('valor-total');
            let carrinho = JSON.parse(localStorage.getItem('carrinho_megusta')) || [];
            container.innerHTML = '';
            let somaTotal = 0;

            if (carrinho.length === 0) {
                container.innerHTML = '<p style="font-size:11px; color:#ccc; letter-spacing:2px;">Carrinho vazio.</p>';
                totalElement.innerText = 'R$ 0,00';
                return;
            }

            carrinho.forEach((item, index) => {
                const qtd = item.quantidade || 1;
                const precoUnitario = parseFloat(item.preco.replace('R$', '').replace('.', '').replace(',', '.'));
                somaTotal += (precoUnitario * qtd);
                container.innerHTML += `
                    <div class="item-carrinho">
                        <div class="item-info">
                            <img src="${item.foto}" class="item-img">
                            <div class="item-detalhes">
                                <h3>${item.nome}</h3>
                                <div class="controles-qtd">
                                    <button class="btn-qtd" onclick="alterarQtd(${index}, -1)">-</button>
                                    <span class="qtd-numero">${qtd}</span>
                                    <button class="btn-qtd" onclick="alterarQtd(${index}, 1)">+</button>
                                </div>
                                <button class="btn-remover" onclick="removerItem(${index})">Remover</button>
                            </div>
                        </div>
                        <div style="font-weight:700; font-size:12px;">${item.preco}</div>
                    </div>`;
            });
            totalElement.innerText = 'R$ ' + somaTotal.toLocaleString('pt-br', {minimumFractionDigits: 2});
        }

        window.alterarQtd = function(index, delta) {
            let carrinho = JSON.parse(localStorage.getItem('carrinho_megusta')) || [];
            const item = carrinho[index];
            const novaQtd = (item.quantidade || 1) + delta;
            if (delta > 0 && novaQtd > item.estoqueMax) return alert(`Temos apenas ${item.estoqueMax} em estoque.`);
            if (novaQtd < 1) return removerItem(index);
            item.quantidade = novaQtd;
            localStorage.setItem('carrinho_megusta', JSON.stringify(carrinho));
            renderizarCarrinho();
        };

        window.removerItem = function(index) {
            let carrinho = JSON.parse(localStorage.getItem('carrinho_megusta')) || [];
            carrinho.splice(index, 1);
            localStorage.setItem('carrinho_megusta', JSON.stringify(carrinho));
            renderizarCarrinho();
        };

        window.confirmarPedido = async function() {
            let carrinho = JSON.parse(localStorage.getItem('carrinho_megusta')) || [];
            if (carrinho.length === 0) return;
            document.getElementById('modalSucesso').style.display = 'flex';
            for (const item of carrinho) {
                try { await updateDoc(doc(db, "produtos", item.id), { estoque: increment(-item.quantidade) }); } catch (e) {}
            }
            let texto = "*Novo Pedido - MeGusta*\n\n";
            let total = 0;
            carrinho.forEach(item => {
                const qtd = item.quantidade || 1;
                const preco = parseFloat(item.preco.replace('R$', '').replace('.', '').replace(',', '.'));
                texto += `• ${qtd}x ${item.nome} (${item.preco})\n`;
                total += (preco * qtd);
            });
            texto += `\n*Total: R$ ${total.toLocaleString('pt-br', {minimumFractionDigits: 2})}*`;
            setTimeout(() => {
                window.open(`https://api.whatsapp.com/send?phone=5511985906325&text=${encodeURIComponent(texto)}`, '_blank');
                localStorage.removeItem('carrinho_megusta');
                window.location.href = "index.html";
            }, 4000);
        };
        renderizarCarrinho();
    </script>
</body>
</html>
