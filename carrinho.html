<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua Sacola - Megusta Semijóias</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.2">
    
    <style>
        /* Estrutura para manter o rodapé no final */
        html, body {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: 'Montserrat', sans-serif;
        }
        main {
            flex: 1 0 auto;
            padding: 60px 20px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        footer {
            flex-shrink: 0;
        }

        /* Estilo do Botão Luxo Arredondado */
        .btn-finalizar-luxo {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 18px 40px;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            border-radius: 50px; /* Bordas arredondadas */
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 350px;
            margin-top: 30px;
        }

        .btn-finalizar-luxo:hover {
            background-color: #D1BE9C; /* Tom dourado ao passar o mouse */
            letter-spacing: 5px;
        }

        /* Título e Resumo */
        .titulo-sacola {
            text-align: center;
            letter-spacing: 8px;
            font-weight: 200;
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        #total-carrinho {
            font-weight: 300;
            letter-spacing: 3px;
            font-size: 18px;
            color: #222;
        }

        .link-fendi {
            color: #A39684;
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" style="text-align: center; padding: 30px 0;">
            <a href="index.html"><img src="Logo.png" alt="Megusta" class="logo" style="max-width: 150px;"></a>
        </div>
        <nav style="text-align: center; margin-bottom: 20px;">
            <a href="index.html" style="text-decoration: none; color: #999; font-size: 10px; letter-spacing: 2px; font-weight: 400;">← VOLTAR PARA A LOJA</a>
        </nav>
    </header>

    <main>
        <h1 class="titulo-sacola">SUA SACOLA</h1>
        
        <div id="itens-carrinho">
            </div>

        <div id="resumo-carrinho" style="text-align: center; margin-top: 50px; border-top: 1px solid #f2f2f2; padding-top: 40px;">
            <p style="font-size: 10px; color: #999; letter-spacing: 2px; margin-bottom: 10px;">VALOR TOTAL</p>
            <h3 id="total-carrinho">R$ 0,00</h3>
            <button id="btn-finalizar" class="btn-finalizar-luxo">FINALIZAR COMPRA</button>
        </div>
    </main>

    <footer>
        <div style="background-color: #F9F9F9; padding: 25px 10px; text-align: center; border-top: 1px solid #eee;">
            <div style="max-width: 600px; margin: 0 auto; display: flex; justify-content: center; gap: 40px;">
                <a href="#" class="link-fendi">Sobre a Empresa</a>
                <a href="https://wa.me/5511985906325" target="_blank" class="link-fendi">Contato</a>
                <a href="https://www.instagram.com/megustasemijoias/" target="_blank" class="link-fendi">Instagram</a>
            </div>
        </div>

        <div style="background-color: #000; padding: 15px 10px; text-align: center;">
            <p style="font-size: 8px; letter-spacing: 2px; color: #FFFFFF; margin: 0; text-transform: uppercase; font-weight: 300;">
                © 2026 MEGUSTA SEMIJÓIAS - DESENVOLVIDO POR <strong style="font-weight: 700; color: #FFFFFF;">VOLCOF.UNLIMITED</strong>
            </p>
        </div>
    </footer>

    <script type="module" src="carrinho.js"></script>
</body>
</html>
