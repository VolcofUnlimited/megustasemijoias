<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Megusta Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F9F9F9; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #fff; width: 100%; max-width: 350px; padding: 40px; border-radius: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.04); text-align: center; }
        .logo { width: 150px; margin-bottom: 30px; }
        .btn-google { 
            width: 100%; background: #fff; color: #000; border: 1px solid #eee; padding: 15px; 
            border-radius: 60px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; 
            font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-google:hover { background: #fafafa; border-color: #ddd; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="Logo.png" class="logo">
        <h2 style="font-size: 12px; letter-spacing: 3px; font-weight: 300; margin-bottom: 30px;">PAINEL ADMINISTRATIVO</h2>
        
        <button id="btn-google-login" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Entrar com Google
        </button>

        <p id="msg" style="font-size: 10px; color: red; margin-top: 15px;"></p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDuV0zO-5M4IkpTqzwaWqvL15HCitqaXME", 
        authDomain: "megusta-semijoias.firebaseapp.com", 
        projectId: "megusta-semijoias", 
        storageBucket: "megusta-semijoias.appspot.com", 
        messagingSenderId: "998632232244", 
        appId: "1:998632232244:web:45473970818b8374e20161" 
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    document.getElementById('btn-google-login').onclick = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            // Opcional: Validar se o e-mail logado é o SEU e-mail de admin
            if (result.user.email === "SEU-EMAIL@gmail.com") {
                window.location.href = "admin.html";
            } else {
                // Se quiser restringir apenas para você, descomente as linhas acima e abaixo
                window.location.href = "admin.html"; 
            }
        } catch (err) {
            console.error(err);
            document.getElementById('msg').innerText = "ERRO AO AUTENTICAR.";
        }
    };
</script>
</body>
</html>
